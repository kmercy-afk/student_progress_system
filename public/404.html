<!DOCTYPE html>
<html>
<head>
  <title>Page Not Found</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      text-align: center;
      padding: 80px;
      color: #1f2937;
    }

    .error-box {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
